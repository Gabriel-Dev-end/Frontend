<div class="products-container">
  <!-- Header with New Product Button -->
  <div class="products-header">
    <h1 class="products-title">Produtos</h1>
    <button 
      class="btn btn-new-product"
      (click)="openNewProductModal()"
      [disabled]="isLoading">
      ➕ Novo Produto
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-state">
    <app-loading-spinner></app-loading-spinner>
  </div>

  <!-- Error State -->
  <div *ngIf="hasError && !isLoading" class="error-state">
    <p>Erro ao carregar produtos. Tente novamente.</p>
    <button class="btn btn-retry" (click)="getProducts(currentPage, 10)">
      🔄 Tentar Novamente
    </button>
  </div>

  <!-- Products Table -->
  <div *ngIf="!isLoading && !hasError && products.length > 0">
    <app-product-table 
      [products]="products"
      [isLoading]="isLoading"
      (edit)="onEditProduct($event)"
      (delete)="onDeleteProduct($event)">
    </app-product-table>

    <!-- Paginator -->
    <app-paginator 
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      [totalElements]="totalElements"
      (pageChange)="changePage($event)">
    </app-paginator>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && !hasError && products.length === 0" class="empty-state">
    <p>Nenhum produto disponível no momento.</p>
    <button 
      class="btn btn-new-product-empty"
      (click)="openNewProductModal()">
      ➕ Criar Primeiro Produto
    </button>
  </div>
</div>

<!-- Create/Edit Product Modal -->
<app-modal *ngIf="isModalOpen" (close)="closeModal()">
  <div class="modal-header">
    <h2 class="modal-title">
      {{ productSelecionado ? 'Editar Produto' : 'Novo Produto' }}
    </h2>
  </div>
  <app-product-form
    [product]="productSelecionado"
    (formSubmit)="createProduct($event)">
  </app-product-form>
</app-modal>

<!-- Delete Confirmation Modal -->
<app-modal *ngIf="isConfirmDialogOpen" (close)="closeConfirmDialog()">
  <app-confirm-dialog
    title="Deletar Produto?"
    [message]="'Tem certeza que deseja deletar o produto: ' + (productToDelete?.title || '')"
    confirmText="Deletar"
    cancelText="Cancelar"
    [isDangerous]="true"
    (confirm)="confirmDelete()"
    (cancel)="closeConfirmDialog()">
  </app-confirm-dialog>
</app-modal>
