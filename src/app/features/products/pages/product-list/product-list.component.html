<div class="products-container">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-state">
    <app-loading-spinner></app-loading-spinner>
  </div>

  <!-- Error State -->
  <div *ngIf="hasError && !isLoading" class="error-state">
    <p>Erro ao carregar produtos. Tente novamente.</p>
    <button (click)="getProducts(currentPage, 10)">Tentar Novamente</button>
  </div>

  <!-- Products List -->
  <div *ngIf="!isLoading && !hasError && products.length > 0" class="products-grid">
    <div *ngFor="let product of products" class="product-card">
      <img *ngIf="product.imageBase64" [src]="'data:image/png;base64,' + product.imageBase64" alt="{{ product.title }}" class="product-image" />
      <div class="product-info">
        <h3 class="product-title">{{ product.title }}</h3>
        <p class="product-category" *ngIf="product.category">{{ product.category }}</p>
        <p class="product-description">{{ product.description }}</p>
        <div class="product-footer">
          <span class="product-price">R$ {{ product.price | number: '1.2-2' }}</span>
          <span class="product-status" [ngClass]="'status-' + product.status.toLowerCase()">
            {{ product.status }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && !hasError && products.length === 0" class="empty-state">
    <p>Nenhum produto disponível no momento.</p>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && !hasError && totalPages > 1" class="pagination">
    <button 
      [disabled]="currentPage === 0" 
      (click)="changePage(currentPage - 1)"
      class="pagination-btn">
      Anterior
    </button>
    <span class="pagination-info">
      Página {{ currentPage + 1 }} de {{ totalPages }}
    </span>
    <button 
      [disabled]="currentPage === totalPages - 1" 
      (click)="changePage(currentPage + 1)"
      class="pagination-btn">
      Próxima
    </button>
  </div>
</div>
