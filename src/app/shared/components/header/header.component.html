<header class="header">
  <div class="header-content">
    <div class="header-section">
      <h1 class="logo">SIPEL</h1>
    </div>

    <div class="header-section header-user">
      <div class="user-info" *ngIf="user">
        <span class="user-icon">👤</span>
        <p class="user-email">{{ user.email }}</p>
      </div>

      <button 
        class="btn-logout"
        (click)="onLogout()"
        title="Desconectar">
        Logout
      </button>
    </div>
  </div>
</header>
